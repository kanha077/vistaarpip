apiVersion: apps/v1
kind: Deployment

metadata:
  name: api
  namespace: vistaar

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: news-api:latest
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: app-config

          ports:
            - containerPort: 8080

          livenessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 2
            periodSeconds: 5